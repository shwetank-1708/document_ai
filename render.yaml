services:
  - type: web
    name: document-ai-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true

  - type: web
    name: document-ai-dashboard
    env: docker
    dockerfilePath: ./Dockerfile.dashboard
    plan: free
    autoDeploy: true
    envVars:
      - key: API_BASE_URL
        value: https://your-api-service-url.onrender.com
